<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Amir Kadhim Al-Shiblawi | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #06080f;
            color: #e2e8f0;
            min-height: 100vh;
            /* حل مشكلة الطول في الآيفون */
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        .wrap {
            position: relative; z-index: 2;
            width: 100%; max-width: 420px;
            padding: 40px 20px 80px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .avatar-wrap {
            position: relative;
            width: 90px; height: 90px;
            margin: 0 auto 20px;
        }
        .avatar-ring {
            position: absolute; inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #c9a84c, #e8c96e, #c9a84c, #8a6d2f, #c9a84c);
            animation: spinRing 8s linear infinite;
        }
        .avatar-inner {
            position: relative; z-index: 1;
            width: 90px; height: 90px;
            border-radius: 50%;
            background: #0a1a30;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: #c9a84c;
            border: 3px solid #06080f;
        }
        @keyframes spinRing { to { transform: rotate(360deg); } }

        .name {
            font-size: 24px; font-weight: 800;
            color: #fff; margin-bottom: 8px;
        }
        .gold-line {
            width: 40px; height: 2px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
            margin: 0 auto 12px;
        }
        .bio {
            font-size: 10px; font-weight: 500;
            color: #475569;
            text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ── LINKS ── */
        .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            display: flex; align-items: center; gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 16px;
            text-decoration: none; color: #e2e8f0;
            transition: transform 0.2s ease;
        }

        /* تأثير الضغط المتوافق مع الآيفون */
        .link-card:active {
            transform: scale(0.96);
            background: rgba(255,255,255,.08);
        }

        .card-icon-wrap {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .card-text { flex: 1; text-align: right; }
        .card-title { font-size: 15px; font-weight: 700; color: #f1f5f9; display: block; }
        .card-sub { font-size: 9px; color: #475569; font-family: 'Rajdhani', sans-serif; }

        .footer {
            margin-top: 50px; text-align: center;
            opacity: 0.6;
        }
        .footer p { font-size: 12px; font-weight: 700; color: #475569; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrap">
    <div class="header">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-inner"><i class="fa-solid fa-user"></i></div>
        </div>
        <h1 class="name">أمير كاظم الشبلاوي</h1>
        <div class="gold-line"></div>
        <p class="bio">Official Links • 2026</p>
    </div>

    <div class="links">
        <a href="https://instagram.com/amop2_6" target="_blank" class="link-card">
            <div class="card-icon-wrap" style="background:rgba(236,72,153,.1)"><i class="fab fa-instagram" style="color:#ec4899"></i></div>
            <div class="card-text"><span class="card-title">إنستغرام</span><span class="card-sub">Follow me</span></div>
            <i class="fas fa-chevron-left" style="font-size: 10px; color: #1e293b;"></i>
        </a>

        <a href="https://t.me/amop2_6" target="_blank" class="link-card">
            <div class="card-icon-wrap" style="background:rgba(14,165,233,.1)"><i class="fab fa-telegram-plane" style="color:#38bdf8"></i></div>
            <div class="card-text"><span class="card-title">تيليجرام</span><span class="card-sub">Message me</span></div>
            <i class="fas fa-chevron-left" style="font-size: 10px; color: #1e293b;"></i>
        </a>

        <a href="https://wa.me/9647866941196" target="_blank" class="link-card">
            <div class="card-icon-wrap" style="background:rgba(34,197,94,.1)"><i class="fab fa-whatsapp" style="color:#4ade80"></i></div>
            <div class="card-text"><span class="card-title">واتساب</span><span class="card-sub">Chat now</span></div>
            <i class="fas fa-chevron-left" style="font-size: 10px; color: #1e293b;"></i>
        </a>

        <a href="https://www.facebook.com/share/17VhtYKEka/" target="_blank" class="link-card">
            <div class="card-icon-wrap" style="background:rgba(59,130,246,.1)"><i class="fab fa-facebook" style="color:#60a5fa"></i></div>
            <div class="card-text"><span class="card-title">فيسبوك</span><span class="card-sub">Profile</span></div>
            <i class="fas fa-chevron-left" style="font-size: 10px; color: #1e293b;"></i>
        </a>
    </div>

    <footer class="footer">
        <p>Amir Kadhim Al-Shiblawi &copy; 2026</p>
    </footer>
</div>

<script>
    // كود الخلفية المحسن ليعمل بسلاسة على الآيفون بدون استهلاك بطارية
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    function draw() {
        ctx.clearRect(0, 0, W, H);
        const grd = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.6);
        grd.addColorStop(0, 'rgba(15,100,80,0.1)');
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
