<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050505">
<title>VIP Link-in-Bio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#c9a84c;--bright:#f1d38e;--dark:#050505;--card:#0c0c0c;--border:rgba(201,168,76,0.2)}
body{font-family:'Tajawal',sans-serif;background:var(--dark);color:#fff;min-height:100vh}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{box-shadow:0 0 18px rgba(201,168,76,.4)}50%{box-shadow:0 0 35px rgba(201,168,76,.75)}}
@keyframes sparkle {0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.6;transform:scale(1.5)}}
#view-profile,#view-admin,#view-home,#view-login,#view-404{display:none;min-height:100vh}
#view-profile{flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 20%,rgba(201,168,76,.08),transparent 65%),var(--dark)}
.star{position:absolute;border-radius:50%;background:var(--bright);pointer-events:none;animation:sparkle 3s ease-in-out infinite}
.avatar-wrap{position:relative;width:130px;height:130px;margin:0 auto 24px;animation:fadeUp .6s ease both}
.ring{position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(var(--gold),var(--bright),#8a6d2f,var(--gold));animation:spin 8s linear infinite}
.ring-gap{position:absolute;inset:3px;border-radius:50%;background:var(--dark);z-index:1}
.avatar-inner{position:absolute;inset:7px;border-radius:50%;background:#111;z-index:2;overflow:hidden;display:flex;align-items:center;justify-content:center}
.avatar-inner img{width:100%;height:100%;object-fit:cover}
.avatar-inner i{font-size:46px;color:var(--gold)}
.p-name-ar{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 0 20px rgba(255,255,255,.15);animation:fadeUp .65s ease both}
.p-name-en{font-family:'Playfair Display',serif;font-style:italic;font-size:21px;color:var(--gold);margin-bottom:10px;letter-spacing:.5px;text-shadow:0 0 12px rgba(201,168,76,.5);animation:fadeUp .7s ease both}
.p-tag{color:#888;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;animation:fadeUp .73s ease both}
.p-bio{color:#555;font-size:13px;max-width:260px;line-height:1.8;margin:0 auto 30px;animation:fadeUp .76s ease both}
.social-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fadeUp .8s ease both}
.social-row a{color:var(--gold);font-size:26px;width:68px;height:68px;border-radius:20px;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1.5px solid rgba(201,168,76,.35);background:rgba(201,168,76,.05);box-shadow:0 0 18px rgba(201,168,76,.35),inset 0 0 12px rgba(201,168,76,.05);animation:pulse 3s ease-in-out infinite;transition:all .25s}
.social-row a:hover{background:rgba(201,168,76,.15);transform:translateY(-3px) scale(1.06);box-shadow:0 0 35px rgba(201,168,76,.6)}
.panel{max-width:700px;margin:0 auto;padding:28px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;margin-bottom:16px;animation:fadeUp .4s ease both}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;width:320px;text-align:center;animation:fadeUp .5s ease both;box-shadow:0 0 50px rgba(201,168,76,.07)}
input[type=text],input[type=password]{width:100%;background:#050505;border:1px solid #222;border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;font-family:'Tajawal',sans-serif;outline:none;margin-bottom:10px;transition:border-color .2s;direction:inherit}
input:focus{border-color:var(--gold)}
input[dir=ltr]{direction:ltr}
.btn-gold{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#7a5c1e,var(--gold),var(--bright),var(--gold));font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;color:#000;margin-bottom:8px;transition:opacity .2s}
.btn-gold:hover{opacity:.85}
.btn-gray{width:100%;padding:13px;border:1px solid #2a2a2a;border-radius:12px;cursor:pointer;background:#1a1a1a;font-family:'Tajawal',sans-serif;font-weight:600;font-size:14px;color:#aaa;transition:background .2s}
.btn-gray:hover{background:#222}
.btn-sm{padding:9px 14px;border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;border:1px solid;white-space:nowrap}
.link-box{background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.link-box p{color:#555;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.link-box code{color:var(--bright);font-size:11px;word-break:break-all;line-height:1.7;display:block;font-family:monospace}
.client-card{background:var(--card);border:1px solid #1a1a1a;border-radius:18px;padding:18px;margin-bottom:14px;animation:fadeUp .4s ease both}
.client-top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.client-avatar{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--border);background:#111;display:flex;align-items:center;justify-content:center}
.client-actions{display:flex;gap:8px}
.admin-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #111;padding-bottom:20px;margin-bottom:20px}
.photo-row{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.photo-thumb{width:58px;height:58px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#111;display:flex;align-items:center;justify-content:center}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.del-confirm{margin-top:12px;background:rgba(229,85,85,.06);border:1px solid rgba(229,85,85,.2);border-radius:12px;padding:14px;text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0}
label.lbl{color:#555;font-size:11px;display:block;margin-bottom:4px;text-align:right}
.photo-row{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.photo-thumb{width:58px;height:58px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#111;display:flex;align-items:center;justify-content:center}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
#preview-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;align-items:center;justify-content:center}
#preview-modal.open{display:flex}
#preview-inner{width:340px;border-radius:24px;overflow:hidden;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.center-page{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;animation:fadeUp .5s ease both}
#search-box{margin-bottom:16px}
.empty{text-align:center;color:#2a2a2a;padding:60px;font-size:15px}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;border:1px solid var(--border);color:var(--gold);padding:12px 24px;border-radius:30px;font-size:14px;font-family:'Tajawal',sans-serif;transition:transform .3s ease;z-index:9999;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#preview-profile-wrap{flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 20%,rgba(201,168,76,.08),transparent 65%),var(--dark)}
</style>
</head>
<body>

<div id="toast"></div>

<div id="preview-modal">
  <div id="preview-inner">
    <div id="preview-profile-wrap" style="display:flex"></div>
    <div style="background:#0c0c0c;padding:16px;text-align:center">
      <button class="btn-gray" onclick="closePreview()">✕ إغلاق المعاينة</button>
    </div>
  </div>
</div>

<div id="view-home" style="display:flex">
  <div class="center-page" style="min-height:100vh;width:100%">
    <div style="font-size:56px;margin-bottom:18px">💎</div>
    <h1 style="color:var(--gold);font-size:22px;margin-bottom:10px;font-weight:800">VIP Link-in-Bio</h1>
    <p style="color:#333;font-size:13px;margin-bottom:28px;line-height:2">نظام احترافي لإدارة صفحات التواصل<br>لزبائنك بدون ذكر اسمك</p>
    <button class="btn-gold" style="max-width:200px" onclick="goAdmin()">🔑 دخول الأدمن</button>
  </div>
</div>

<div id="view-login" style="display:none;align-items:center;justify-content:center">
  <div class="card-sm">
    <div style="font-size:42px;margin-bottom:16px">🔐</div>
    <h2 style="color:var(--gold);margin-bottom:22px;font-size:20px">سوبر أدمن</h2>
    <input type="password" id="pw-input" placeholder="كلمة السر" dir="ltr" onkeydown="if(event.key==='Enter')checkPw()">
    <p id="pw-err" style="color:#e55;font-size:13px;margin-bottom:8px;display:none">كلمة السر غلط ❌</p>
    <button class="btn-gold" onclick="checkPw()">دخول</button>
  </div>
</div>

<div id="view-404">
  <div class="center-page" style="min-height:100vh;width:100%">
    <div style="font-size:60px;margin-bottom:10px">🕳️</div>
    <p style="color:#333;font-size:16px">الصفحة غير موجودة</p>
  </div>
</div>

<div id="view-profile"></div>

<div id="view-admin" style="display:none">
  <div class="panel">
    <div class="admin-header">
      <div>
        <h1 style="color:var(--gold);font-size:20px;font-weight:800">🔑 سوبر أدمن</h1>
        <p id="clients-count" style="color:#444;font-size:13px;margin-top:2px">0 زبون مسجل</p>
      </div>
      <button class="btn-gold" style="width:auto;padding:11px 20px;font-size:14px" onclick="showAddForm()">+ زبون جديد</button>
    </div>

    <div id="client-form" style="display:none" class="card">
      <h3 id="form-title" style="color:var(--gold);margin-bottom:20px;font-size:17px;text-align:right">➕ إضافة زبون جديد</h3>
      <div class="grid2">
        <div><label class="lbl">الاسم بالعربي</label><input type="text" id="f-nameAr" placeholder="أحمد محمد"></div>
        <div><label class="lbl">الاسم بالإنكليزي</label><input type="text" id="f-nameEn" placeholder="Ahmed M." dir="ltr"></div>
      </div>
      <label class="lbl" style="margin-top:4px">🔗 الرابط الخاص <span style="color:#333">(إنكليزي بدون مسافات)</span></label>
      <input type="text" id="f-slug" placeholder="ahmed2026" dir="ltr" oninput="updateSlugPreview()">
      <p id="slug-err" style="color:#e55;font-size:11px;margin-bottom:6px;display:none"></p>
      <div id="slug-preview" style="display:none" class="link-box">
        <p>رابط الزبون 🔗</p>
        <code id="slug-preview-text"></code>
      </div>
      <label class="lbl" style="margin-top:8px">نبذة مختصرة (اختياري)</label>
      <input type="text" id="f-bio" placeholder="رجل أعمال | مستثمر عقاري">
      <div class="grid2">
        <div><label class="lbl">📱 واتساب</label><input type="text" id="f-wa" placeholder="9647801234567" dir="ltr"></div>
        <div><label class="lbl">📷 إنستغرام</label><input type="text" id="f-ig" placeholder="@username" dir="ltr"></div>
        <div><label class="lbl">✈️ تيليجرام</label><input type="text" id="f-tg" placeholder="@username" dir="ltr"></div>
        <div><label class="lbl">👤 فيسبوك</label><input type="text" id="f-fb" placeholder="رابط الصفحة" dir="ltr"></div>
        <div><label class="lbl">🎵 تيك توك</label><input type="text" id="f-tt" placeholder="@username" dir="ltr"></div>
        <div><label class="lbl">🎮 PUBG ID</label><input type="text" id="f-pubg" placeholder="مثال: 123456789" dir="ltr"></div>
        <div><label class="lbl">📢 قناة تيليجرام</label><input type="text" id="f-tgch" placeholder="@channel أو رابط" dir="ltr"></div>
      </div>
      <label class="lbl">🖼️ صورة شخصية (اختياري)</label>
      <div class="photo-row">
        <div class="photo-thumb" id="photo-thumb-wrap" style="border:2px dashed #2a2a2a">
          <i class="fa-solid fa-user" style="color:#333;font-size:22px"></i>
        </div>
        <div style="flex:1">
          <input type="file" id="f-photo-input" accept="image/*" style="display:none" onchange="handlePhoto(event)">
          <button class="btn-gray" id="photo-btn" onclick="document.getElementById('f-photo-input').click()">رفع صورة 📤</button>
          <button id="photo-remove-btn" onclick="removePhoto()" style="background:none;border:none;color:#e55;font-size:11px;cursor:pointer;margin-top:4px;width:100%;font-family:'Tajawal',sans-serif;display:none">حذف الصورة ✕</button>
        </div>
      </div>
      <input type="hidden" id="f-photo">
      <input type="hidden" id="f-edit-id">
      <div style="display:flex;gap:10px">
        <div style="flex:1"><button class="btn-gold" onclick="saveClient()">💾 حفظ</button></div>
        <div style="flex:1"><button class="btn-gray" onclick="cancelForm()">إلغاء</button></div>
      </div>
    </div>

    <div id="search-box" style="display:none"><input type="text" placeholder="🔍 بحث..." id="search-input" oninput="renderList()"></div>
    <div id="clients-list"></div>
    <div id="empty-msg" class="empty" style="display:none">أضف أول زبون لك! 👆</div>
  </div>
</div>

<script>
// ── Firebase ────────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyCv4V2hfF_I8nPzo1KbMRXypHSf-kiE4FU",
  authDomain:        "my-work-38400.firebaseapp.com",
  projectId:         "my-work-38400",
  storageBucket:     "my-work-38400.firebasestorage.app",
  messagingSenderId: "883484546361",
  appId:             "1:883484546361:web:88b5758e29aeaf995884e8"
});
var db  = firebase.firestore();
var COL = "clients";

// ── Config ──────────────────────────────────────────────────────────────────────
var PASS  = "ADMIN2026"; // ← غيّر كلمة السر هنا
var BASE  = window.location.origin + window.location.pathname;
var CACHE = [];

// ── Firestore ───────────────────────────────────────────────────────────────────
function dbGetAll() {
  return db.collection(COL).orderBy("ts","asc").get()
    .then(function(snap) {
      CACHE = snap.docs.map(function(d) { return d.data(); });
      return CACHE;
    })
    .catch(function() { CACHE = []; return []; });
}

function dbSave(obj) {
  return db.collection(COL).doc(obj.id).set(obj)
    .then(function() {
      var i = CACHE.findIndex(function(c) { return c.id === obj.id; });
      if (i >= 0) CACHE[i] = obj; else CACHE.push(obj);
    });
}

function dbDelete(id) {
  return db.collection(COL).doc(id).delete()
    .then(function() {
      CACHE = CACHE.filter(function(c) { return c.id !== id; });
    });
}

function dbFindSlug(slug) {
  return db.collection(COL).where("slug","==",slug).limit(1).get()
    .then(function(snap) { return snap.empty ? null : snap.docs[0].data(); })
    .catch(function() { return null; });
}

// ── Router ──────────────────────────────────────────────────────────────────────
function show(id) {
  ["view-home","view-login","view-admin","view-profile","view-404"].forEach(function(v) {
    document.getElementById(v).style.display = "none";
  });
  document.getElementById(id).style.display = "flex";
}

function route() {
  var h = window.location.hash;
  if (h.startsWith("#/u/")) {
    var slug = h.slice(4);
    show("view-profile");
    document.getElementById("view-profile").innerHTML =
      '<div style="margin:auto;padding-top:42vh;color:var(--gold);font-size:40px">⏳</div>';
    dbFindSlug(slug).then(function(c) {
      if (c) renderProfile(c, document.getElementById("view-profile"));
      else show("view-404");
    });
    return;
  }
  if (h === "#/admin") {
    if (sessionStorage.getItem("ok") === "1") { show("view-admin"); renderList(); }
    else show("view-login");
    return;
  }
  show("view-home");
}

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", route);

// ── Auth ────────────────────────────────────────────────────────────────────────
function goAdmin() { window.location.hash = "#/admin"; }

function checkPw() {
  var v = document.getElementById("pw-input").value;
  if (v === PASS) {
    sessionStorage.setItem("ok","1");
    document.getElementById("pw-err").style.display = "none";
    show("view-admin"); renderList();
  } else {
    document.getElementById("pw-err").style.display = "block";
  }
}

// ── Profile ─────────────────────────────────────────────────────────────────────
function cleanUser(val) {
  if (!val) return "";
  val = val.trim();
  if (val.startsWith("http://") || val.startsWith("https://")) {
    val = val.replace(/\/$/, "").split("/").pop();
  }
  return val.replace("@","");
}

function renderProfile(c, el) {
  var wa   = c.wa   ? c.wa.replace(/\D/g,"")  : "";
  var ig   = cleanUser(c.ig);
  var tg   = cleanUser(c.tg);
  var fb   = c.fb   ? c.fb.trim()             : "";
  var tt   = cleanUser(c.tt);
  var pubg = c.pubg ? c.pubg.trim()           : "";

  var tgch = cleanUser(c.tgch||"");

  var links = [
    { cls:"fab fa-whatsapp",       url: wa   ? "https://wa.me/"              + wa   : "",    pubgId:"" },
    { cls:"fab fa-instagram",      url: ig   ? "https://www.instagram.com/"  + ig   : "",    pubgId:"" },
    { cls:"fab fa-telegram-plane", url: tg   ? "https://t.me/"               + tg   : "",    pubgId:"" },
    { cls:"fab fa-facebook-f",     url: fb   ? (fb.startsWith("http") ? fb : "https://facebook.com/" + fb) : "", pubgId:"" },
    { cls:"fab fa-tiktok",         url: tt   ? "https://www.tiktok.com/@"    + tt   : "",    pubgId:"" },
    { cls:"fab fa-telegram-plane", url: tgch ? "https://t.me/"               + tgch : "",    pubgId:"", extra:"channel" },
    { cls:"fas fa-gamepad",        url: pubg ? "#"                                   : "",    pubgId: pubg }
  ].filter(function(l) { return l.url; });

  var stars = "";
  for (var i = 0; i < 18; i++) {
    var x=Math.random()*100, y=Math.random()*100, s=Math.random()*3+1, d=Math.random()*3;
    stars += '<div class="star" style="left:'+x+'%;top:'+y+'%;width:'+s+'px;height:'+s+'px;animation-delay:'+d+'s"></div>';
  }

  var photo   = c.photo ? '<img src="'+c.photo+'" alt="">' : '<i class="fa-solid fa-user"></i>';
  var bio     = c.bio   ? '<p class="p-bio">'+c.bio+'</p>' : "";
  var socials = links.map(function(l) {
    if (l.pubgId) {
      return '<a href="#" class="pubg-btn" data-id="'+l.pubgId+'" style="position:relative" rel="noreferrer"><i class="'+l.cls+'"></i></a>';
    }
    if (l.extra === "channel") {
      return '<a href="'+l.url+'" target="_blank" rel="noreferrer" style="position:relative"><i class="'+l.cls+'"></i><span style="position:absolute;top:-6px;right:-6px;background:#229ed9;color:#fff;font-size:8px;font-weight:900;border-radius:99px;padding:1px 5px;font-family:sans-serif">CH</span></a>';
    }
    return '<a href="'+l.url+'" target="_blank" rel="noreferrer"><i class="'+l.cls+'"></i></a>';
  }).join("");

  el.innerHTML =
    stars +
    '<div class="avatar-wrap"><div class="ring"></div><div class="ring-gap"></div><div class="avatar-inner">'+photo+'</div></div>' +
    '<h1 class="p-name-ar">'+c.nameAr+'</h1>' +
    '<h2 class="p-name-en">'+c.nameEn+'</h2>' +
    '<p class="p-tag">Link-in-bio</p>' +
    bio +
    (links.length ? '<div class="social-row">'+socials+'</div>' : "");

  // PUBG ID popup
  el.querySelectorAll(".pubg-btn").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.preventDefault();
      var pid = btn.getAttribute("data-id");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pid).catch(function(){});
      }
      var old = document.getElementById("pubg-toast");
      if (old) old.remove();
      var toast = document.createElement("div");
      toast.id = "pubg-toast";
      toast.style.cssText = "position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--gold);color:var(--gold);padding:12px 22px;border-radius:30px;font-size:14px;font-family:'Tajawal',sans-serif;z-index:9999;white-space:nowrap;text-align:center";
      toast.innerHTML = "🎮 PUBG ID<br><strong style='font-size:18px;color:#fff'>"+pid+"</strong><br><span style='font-size:11px;color:#888'>تم النسخ ✓</span>";
      document.body.appendChild(toast);
      setTimeout(function(){ toast.remove(); }, 3000);
    });
  });
}

// ── Preview Modal ────────────────────────────────────────────────────────────────
function openPreview(id) {
  var c = CACHE.find(function(x) { return x.id === id; });
  if (!c) return;
  renderProfile(c, document.getElementById("preview-profile-wrap"));
  document.getElementById("preview-modal").classList.add("open");
}
function closePreview() {
  document.getElementById("preview-modal").classList.remove("open");
}

// ── Admin List ───────────────────────────────────────────────────────────────────
function renderList() {
  dbGetAll().then(function(all) {
    var q = (document.getElementById("search-input") || {value:""}).value;
    var list = q ? all.filter(function(c) {
      return c.nameAr.includes(q) || c.nameEn.toLowerCase().includes(q.toLowerCase()) || c.slug.includes(q);
    }) : all;

    document.getElementById("clients-count").textContent = all.length + " زبون مسجل";
    document.getElementById("search-box").style.display  = all.length ? "block" : "none";

    var el = document.getElementById("clients-list");
    el.innerHTML = "";

    if (!list.length) { document.getElementById("empty-msg").style.display = "block"; return; }
    document.getElementById("empty-msg").style.display = "none";

    list.forEach(function(c) {
      var url = BASE + "#/u/" + c.slug;
      var av  = c.photo
        ? '<img src="'+c.photo+'" style="width:100%;height:100%;object-fit:cover">'
        : '<i class="fa-solid fa-user" style="color:var(--gold);font-size:20px"></i>';

      var div = document.createElement("div");
      div.className = "client-card";
      div.innerHTML =
        '<div class="client-top">' +
          '<div class="client-avatar">'+av+'</div>' +
          '<div style="flex:1;min-width:0">' +
            '<p style="color:#fff;font-weight:700;font-size:15px;margin-bottom:2px">'+c.nameAr+'</p>' +
            '<p style="color:#555;font-size:12px">'+c.nameEn+'</p>' +
          '</div>' +
          '<button class="btn-sm bp" style="color:var(--gold);border-color:var(--border);background:rgba(201,168,76,.08)">👁️ معاينة</button>' +
        '</div>' +
        '<div class="link-box"><p>رابط الزبون — أرسله له مباشرة 🔗</p><code>'+url+'</code></div>' +
        '<div class="client-actions">' +
          '<button class="btn-sm bc" style="flex:2;color:var(--gold);border-color:var(--border);background:rgba(201,168,76,.08)">📋 نسخ الرابط</button>' +
          '<button class="btn-sm be" style="flex:1;color:#aaa;border-color:#2a2a2a;background:#111">✏️ تعديل</button>' +
          '<button class="btn-sm bd" style="flex:1;color:#e55;border-color:rgba(229,85,85,.2);background:rgba(229,85,85,.06)">🗑️</button>' +
        '</div>' +
        '<div class="del-confirm dc" style="display:none">' +
          '<p style="color:#e55;margin-bottom:12px;font-size:13px">حذف <strong>'+c.nameAr+'</strong>؟</p>' +
          '<div style="display:flex;gap:8px">' +
            '<button class="by" style="flex:1;background:#e55;border:none;border-radius:9px;padding:10px;color:#fff;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">نعم، احذف</button>' +
            '<button class="bn" style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:10px;color:#aaa;cursor:pointer;font-family:Tajawal,sans-serif">إلغاء</button>' +
          '</div>' +
        '</div>';

      var conf = div.querySelector(".dc");
      div.querySelector(".bp").onclick = function() { openPreview(c.id); };
      div.querySelector(".bc").onclick = function() { copyUrl(url, div.querySelector(".bc")); };
      div.querySelector(".be").onclick = function() { editClient(c.id); };
      div.querySelector(".bd").onclick = function() { conf.style.display = "block"; };
      div.querySelector(".by").onclick = function() { dbDelete(c.id).then(renderList); };
      div.querySelector(".bn").onclick = function() { conf.style.display = "none"; };

      el.appendChild(div);
    });
  });
}

// ── Copy ────────────────────────────────────────────────────────────────────────
function copyUrl(url, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).catch(function() { fallbackCopy(url); });
  } else { fallbackCopy(url); }
  if (btn) { btn.textContent="✅ تم النسخ!"; btn.style.color="#4caf50"; btn.style.borderColor="#4caf50"; }
  showToast("✅ تم نسخ رابط الزبون!");
  setTimeout(function() {
    if (btn) { btn.textContent="📋 نسخ الرابط"; btn.style.color="var(--gold)"; btn.style.borderColor="var(--border)"; }
  }, 3000);
}
function fallbackCopy(t) {
  var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
}
function showToast(msg) {
  var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

// ── Form ────────────────────────────────────────────────────────────────────────
function showAddForm() {
  clearForm();
  document.getElementById("form-title").textContent = "➕ إضافة زبون جديد";
  document.getElementById("f-edit-id").value = "";
  document.getElementById("client-form").style.display = "block";
  document.getElementById("client-form").scrollIntoView({behavior:"smooth"});
}

function editClient(id) {
  var c = CACHE.find(function(x){return x.id===id;});
  if (!c) return;
  clearForm();
  document.getElementById("form-title").textContent = "✏️ تعديل الزبون";
  document.getElementById("f-edit-id").value = id;
  document.getElementById("f-nameAr").value  = c.nameAr||"";
  document.getElementById("f-nameEn").value  = c.nameEn||"";
  document.getElementById("f-slug").value    = c.slug||"";
  document.getElementById("f-bio").value     = c.bio||"";
  document.getElementById("f-wa").value      = c.wa||"";
  document.getElementById("f-ig").value      = c.ig||"";
  document.getElementById("f-tg").value      = c.tg||"";
  document.getElementById("f-fb").value      = c.fb||"";
  document.getElementById("f-tt").value      = c.tt||"";
  document.getElementById("f-pubg").value    = c.pubg||"";
  document.getElementById("f-tgch").value   = c.tgch||"";
  if (c.photo) setPhotoPreview(c.photo);
  updateSlugPreview();
  document.getElementById("client-form").style.display = "block";
  document.getElementById("client-form").scrollIntoView({behavior:"smooth"});
}

function cancelForm() {
  clearForm();
  document.getElementById("client-form").style.display = "none";
}

function clearForm() {
  ["f-nameAr","f-nameEn","f-slug","f-bio","f-wa","f-ig","f-tg","f-fb","f-tt","f-pubg","f-tgch"].forEach(function(id){
    document.getElementById(id).value="";
  });
  document.getElementById("f-photo").value      = "";
  document.getElementById("f-edit-id").value    = "";
  document.getElementById("f-photo-input").value = "";
  document.getElementById("slug-preview").style.display = "none";
  document.getElementById("slug-err").style.display     = "none";
  var w=document.getElementById("photo-thumb-wrap");
  w.innerHTML='<i class="fa-solid fa-user" style="color:#333;font-size:22px"></i>';
  w.style.border="2px dashed #2a2a2a";
  document.getElementById("photo-btn").textContent="رفع صورة 📤";
  document.getElementById("photo-remove-btn").style.display="none";
}

function saveClient() {
  var nameAr=document.getElementById("f-nameAr").value.trim();
  var nameEn=document.getElementById("f-nameEn").value.trim();
  var slug  =document.getElementById("f-slug").value.trim().toLowerCase();
  var bio   =document.getElementById("f-bio").value.trim();
  var wa    =document.getElementById("f-wa").value.trim();
  var ig    =document.getElementById("f-ig").value.trim();
  var tg    =document.getElementById("f-tg").value.trim();
  var fb    =document.getElementById("f-fb").value.trim();
  var tt    =document.getElementById("f-tt").value.trim();
  var pubg  =document.getElementById("f-pubg").value.trim();
  var tgch  =document.getElementById("f-tgch").value.trim();
  var photo =document.getElementById("f-photo").value;
  var editId=document.getElementById("f-edit-id").value;

  if (!slug) { showSlugErr("الرابط مطلوب"); return; }
  if (!/^[a-z0-9_-]+$/.test(slug)) { showSlugErr("أحرف إنكليزية صغيرة وأرقام فقط"); return; }
  document.getElementById("slug-err").style.display="none";

  if (CACHE.find(function(c){return c.slug===slug && c.id!==editId;})) {
    showSlugErr("هذا الرابط موجود مسبقاً، اختر رابطاً آخر"); return;
  }

  var old = editId ? (CACHE.find(function(c){return c.id===editId;})||{}) : {};

  var obj = {
    id:     editId || Date.now().toString(),
    ts:     old.ts || Date.now(),
    nameAr:nameAr, nameEn:nameEn, slug:slug, bio:bio,
    wa:wa, ig:ig, tg:tg, fb:fb, tt:tt, pubg:pubg, tgch:tgch, photo:photo
  };

  dbSave(obj).then(function() {
    cancelForm();
    renderList();
    showToast(editId ? "✅ تم التعديل!" : "✅ تمت الإضافة!");
  }).catch(function(err) {
    showToast("❌ خطأ في الحفظ — جرب بدون صورة");
    console.error(err);
  });
}

function showSlugErr(msg) {
  var el=document.getElementById("slug-err"); el.textContent=msg; el.style.display="block";
}

function updateSlugPreview() {
  var slug=document.getElementById("f-slug").value.trim().toLowerCase();
  var prev=document.getElementById("slug-preview");
  if (slug) {
    document.getElementById("slug-preview-text").textContent = BASE+"#/u/"+slug;
    prev.style.display="block";
  } else { prev.style.display="none"; }
}

// ── Photo ────────────────────────────────────────────────────────────────────────
function handlePhoto(e) {
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    // ضغط الصورة قبل الحفظ
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      var MAX=400;
      var w=img.width, h=img.height;
      if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
      else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      var compressed=canvas.toDataURL("image/jpeg",0.7);
      setPhotoPreview(compressed);
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function setPhotoPreview(src) {
  document.getElementById("f-photo").value=src;
  var w=document.getElementById("photo-thumb-wrap");
  w.style.border="2px solid var(--gold)";
  w.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover">';
  document.getElementById("photo-btn").textContent="تغيير الصورة 🔄";
  document.getElementById("photo-remove-btn").style.display="block";
}
function removePhoto() {
  document.getElementById("f-photo").value="";
  document.getElementById("f-photo-input").value="";
  var w=document.getElementById("photo-thumb-wrap");
  w.innerHTML='<i class="fa-solid fa-user" style="color:#333;font-size:22px"></i>';
  w.style.border="2px dashed #2a2a2a";
  document.getElementById("photo-btn").textContent="رفع صورة 📤";
  document.getElementById("photo-remove-btn").style.display="none";
}
</script>
