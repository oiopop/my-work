<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amir Kadhim Al-Shiblawi | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #020202;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.1rem;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #f4f4f5;
            margin-bottom: 1rem;
            width: 100%;
        }

        .link-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
        }

        #admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }

        input {
            background: #000 !important;
            border: 1px solid #222 !important;
            color: white !important;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
        }

        .toast {
            position: fixed;
            top: 25px;
            background: #3b82f6;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body class="p-6">

    <div id="toast" class="toast text-sm">تم التحديث بنجاح</div>

    <div class="w-full max-w-md mt-16 text-center">
        <h1 id="v-name" class="text-3xl font-bold tracking-tight mb-4 select-none active:opacity-40">أمير كاظم الشبلاوي</h1>
        <div class="h-[2px] w-12 bg-blue-600 mx-auto rounded-full mb-8"></div>
        <p id="v-bio" class="text-zinc-500 text-xs font-medium mb-12 tracking-widest uppercase">Official Links • 2026</p>

        <div id="links-container" class="space-y-1">
            
            <a id="h-ig" href="#" target="_blank" class="link-card">
                <div class="w-12 h-12 bg-pink-500/10 rounded-2xl flex items-center justify-center ml-4">
                    <i class="fab fa-instagram text-pink-500 text-2xl"></i>
                </div>
                <div class="flex-1 text-right">
                    <span class="block font-bold text-lg">إنستغرام</span>
                    <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Follow me</span>
                </div>
                <i class="fas fa-chevron-left text-zinc-900 text-xs"></i>
            </a>

            <a id="h-tg" href="#" target="_blank" class="link-card">
                <div class="w-12 h-12 bg-sky-500/10 rounded-2xl flex items-center justify-center ml-4">
                    <i class="fab fa-telegram-plane text-sky-400 text-2xl"></i>
                </div>
                <div class="flex-1 text-right">
                    <span class="block font-bold text-lg">تيليجرام</span>
                    <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Message me</span>
                </div>
                <i class="fas fa-chevron-left text-zinc-900 text-xs"></i>
            </a>

            <a id="h-wa" href="#" target="_blank" class="link-card">
                <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center ml-4">
                    <i class="fab fa-whatsapp text-green-500 text-2xl"></i>
                </div>
                <div class="flex-1 text-right">
                    <span class="block font-bold text-lg">واتساب</span>
                    <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Chat now</span>
                </div>
                <i class="fas fa-chevron-left text-zinc-900 text-xs"></i>
            </a>

            <a id="h-fb" href="#" target="_blank" class="link-card">
                <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center ml-4">
                    <i class="fab fa-facebook text-blue-600 text-2xl"></i>
                </div>
                <div class="flex-1 text-right">
                    <span class="block font-bold text-lg">فيسبوك</span>
                    <span class="text-[10px] text-zinc-600 uppercase tracking-widest">Profile</span>
                </div>
                <i class="fas fa-chevron-left text-zinc-900 text-xs"></i>
            </a>

        </div>

        <footer class="mt-auto pt-24 pb-12 text-center">
            <p class="text-[9px] text-zinc-700 tracking-[0.5em] uppercase mb-2">Developed By</p>
            <p class="text-zinc-500 font-bold text-base tracking-tight">Amir Kadhim Al-Shiblawi</p>
            <p class="text-[8px] text-zinc-800 mt-6 tracking-widest uppercase font-medium">Rights Reserved &copy; 2026</p>
        </footer>
    </div>

    <div id="admin-panel">
        <div class="max-w-sm mx-auto mt-10">
            <h2 class="text-2xl font-bold mb-8 text-blue-500 text-center">Cloud Admin</h2>
            <div class="space-y-4">
                <input type="text" id="i-name" placeholder="الاسم">
                <input type="text" id="i-bio" placeholder="الوصف">
                <input type="text" id="i-ig" placeholder="يوزر إنستغرام">
                <input type="text" id="i-tg" placeholder="يوزر تيليجرام">
                <input type="text" id="i-wa" placeholder="رقم واتساب">
                <input type="text" id="i-fb" placeholder="رابط فيسبوك">
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="saveToCloud()" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold">حفظ سحابياً</button>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="px-8 bg-zinc-900 rounded-xl text-sm font-bold">إغلاق</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const MY_SECRET = "2026";
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'amir-final-2026';
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profile');

        let data = {};

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    data = snap.data();
                } else {
                    data = {
                        name: "أمير كاظم الشبلاوي",
                        bio: "الروابط الرسمية ووسائل التواصل • 2026",
                        ig: "amop2_6",
                        tg: "amop2_6",
                        wa: "9647866941196",
                        fb: "https://www.facebook.com/share/17VhtYKEka/"
                    };
                }
                render();
            } else { signInAnonymously(auth); }
        });

        function render() {
            document.getElementById('v-name').innerText = data.name;
            document.getElementById('v-bio').innerText = data.bio;
            document.getElementById('h-ig').href = `https://instagram.com/${data.ig.replace('@','')}`;
            document.getElementById('h-tg').href = `https://t.me/${data.tg.replace('@','')}`;
            document.getElementById('h-wa').href = `https://wa.me/${data.wa}`;
            document.getElementById('h-fb').href = data.fb;
        }

        let timer;
        const nameNode = document.getElementById('v-name');
        const startTimer = () => timer = setTimeout(openAdmin, 2000);
        const clearTimer = () => clearTimeout(timer);
        nameNode.addEventListener('touchstart', startTimer);
        nameNode.addEventListener('touchend', clearTimer);
        nameNode.addEventListener('mousedown', startTimer);
        nameNode.addEventListener('mouseup', clearTimer);

        function openAdmin() {
            const pass = prompt("رمز الإدارة (2026):");
            if (pass === MY_SECRET) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('i-name').value = data.name;
                document.getElementById('i-bio').value = data.bio;
                document.getElementById('i-ig').value = data.ig;
                document.getElementById('i-tg').value = data.tg;
                document.getElementById('i-wa').value = data.wa;
                document.getElementById('i-fb').value = data.fb;
            } else if (pass !== null) { alert("رمز خطأ!"); }
        }

        window.saveToCloud = async () => {
            const up = {
                name: document.getElementById('i-name').value,
                bio: document.getElementById('i-bio').value,
                ig: document.getElementById('i-ig').value,
                tg: document.getElementById('i-tg').value,
                wa: document.getElementById('i-wa').value,
                fb: document.getElementById('i-fb').value
            };
            await setDoc(docRef, up);
            data = up;
            render();
            document.getElementById('admin-panel').style.display = 'none';
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        };
    </script>
</body>
</html>
